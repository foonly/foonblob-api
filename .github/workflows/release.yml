name: Foonblob API build

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25.x
      - name: Tests
        run: go test -v ./internal/api/...
      - name: Build
        run: go build -o bin/foonblob-api cmd/api/main.go
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "bin/foonblob-api"
